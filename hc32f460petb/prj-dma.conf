# SPDX-License-Identifier: Apache-2.0
# DMA mode overlay — use with: west build -b hc32f460petb . -- -DOVERLAY_CONFIG=prj-dma.conf

CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y

# HC32F460 specific
CONFIG_ARM_MPU=n
CONFIG_HW_STACK_PROTECTION=n
CONFIG_DYNAMIC_INTERRUPTS=y

CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_CLOCK_NO_WAIT=y

# UART DMA mode (mutually exclusive with interrupt mode)
CONFIG_UART_HC32_DMA=y

# Input subsystem for gpio-keys button
CONFIG_INPUT=y

# Zephyr Shell (async backend for DMA)
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_ASYNC_API=y
