# FMR_CC Zephyr port: base config
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

CONFIG_GPIO=y
CONFIG_PINCTRL=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BUFFER_SIZE=2048

CONFIG_POLL=y
CONFIG_EVENTS=y
CONFIG_RING_BUFFER=y

# MPU off for bring-up
CONFIG_ARM_MPU=n
CONFIG_HW_STACK_PROTECTION=n
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y

# Business module toggles
CONFIG_APP_FMR_WBUS=y
CONFIG_APP_FMR_IMU=y
CONFIG_APP_FMR_MOTO=y
CONFIG_APP_FMR_SERVO=y
CONFIG_APP_FMR_LIFT=y
CONFIG_APP_FMR_MANUAL_CTRL=y
CONFIG_APP_FMR_LED_595=y
# Battery/USB require ADC/USB drivers not yet ported; compile as stubs.
CONFIG_APP_FMR_BATTERY=n
CONFIG_APP_FMR_USB_UPLINK=n
